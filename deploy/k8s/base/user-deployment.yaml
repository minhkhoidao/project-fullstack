apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-user
  namespace: fashion
  labels:
    app: fashion-user
    app.kubernetes.io/part-of: fashion-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fashion-user
  template:
    metadata:
      labels:
        app: fashion-user
    spec:
      containers:
        - name: user
          image: fashion-ecommerce/user:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: fashion-config
            - secretRef:
                name: fashion-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
