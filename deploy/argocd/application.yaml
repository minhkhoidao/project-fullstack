apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fashion-ecommerce-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/fashion-ecommerce.git
    targetRevision: main
    path: deploy/k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: fashion-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
